# Per-project override: unique containers + Traefik routing
# Generated for slug: project-bolt-1, domain: bolt1.pdfsaas.com

services:
  kong:
    container_name: supabase-project-bolt-1-kong
    ports: []
    volumes:
      - /opt/hosting-panel/infra/supabase/projects/project-bolt-1/volumes/api/kong.yml:/home/kong/temp.yml:ro,z
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hosting_network"
      - "traefik.http.routers.supabase-project-bolt-1.rule=Host(`api.bolt1.pdfsaas.com`)"
      - "traefik.http.routers.supabase-project-bolt-1.entrypoints=websecure,web"
      - "traefik.http.routers.supabase-project-bolt-1.service=supabase-project-bolt-1-kong"
      - "traefik.http.routers.supabase-project-bolt-1.tls=true"
      - "traefik.http.routers.supabase-project-bolt-1.tls.certresolver=letsencrypt"
      - "traefik.http.services.supabase-project-bolt-1-kong.loadbalancer.server.port=8000"
    networks:
      - default
      - hosting_network

  db:
    container_name: supabase-project-bolt-1-db
    volumes:
      - supabase_project-bolt-1_db_data:/var/lib/postgresql/data
      - supabase_project-bolt-1_db_config:/etc/postgresql-custom

  auth:
    container_name: supabase-project-bolt-1-auth

  rest:
    container_name: supabase-project-bolt-1-rest

  realtime:
    container_name: supabase-project-bolt-1-realtime

  storage:
    container_name: supabase-project-bolt-1-storage
    volumes:
      - supabase_project-bolt-1_storage:/var/lib/storage:z

  imgproxy:
    container_name: supabase-project-bolt-1-imgproxy
    volumes:
      - supabase_project-bolt-1_storage:/var/lib/storage:z

  meta:
    container_name: supabase-project-bolt-1-meta

  studio:
    container_name: supabase-project-bolt-1-studio

  analytics:
    container_name: supabase-project-bolt-1-analytics

  functions:
    container_name: supabase-project-bolt-1-functions

  supavisor:
    container_name: supabase-project-bolt-1-pooler

  vector:
    container_name: supabase-project-bolt-1-vector

volumes:
  supabase_project-bolt-1_db_data:
  supabase_project-bolt-1_db_config:
  supabase_project-bolt-1_storage:

networks:
  hosting_network:
    external: true
